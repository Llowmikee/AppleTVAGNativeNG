name: Publish Pages from Release

on:
  release:
    types: [published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find release asset URL
        id: asset
        uses: actions/github-script@v7
        with:
          script: |
            const assets = context.payload.release.assets || [];
            const target = assets.find((asset) => asset.name === 'appletv_agnative.js');
            if (!target) {
              core.setFailed('Release asset appletv_agnative.js was not found');
              return;
            }
            core.setOutput('asset_url', target.url);
            core.setOutput('tag_name', context.payload.release.tag_name);

      - name: Download release asset
        run: |
          mkdir -p release
          curl -sSL \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/octet-stream" \
            "${{ steps.asset.outputs.asset_url }}" \
            -o release/appletv_agnative.js

      - name: Prepare Pages content
        run: |
          node scripts/prepare-pages.mjs
          echo '${{ steps.asset.outputs.tag_name }}' > pages-dist/version.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
